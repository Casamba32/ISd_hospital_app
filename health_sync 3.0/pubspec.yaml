name: hospital_app
description: A hospital management system mobile app
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  cupertino_icons: ^1.0.2
  shared_preferences: ^2.2.2
  speech_to_text: ^6.6.2
  permission_handler: ^11.3.1
  carousel_slider: ^5.0.0
  supabase_flutter: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/isd1.webp
    - assets/images/isd2.webp
    - assets/images/isd3.webp